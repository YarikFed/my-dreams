<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --accent: #9b4cc9;
    --accent2: #bc7ae8;
    --text: #e8e4d9;
    --muted: #7a7568;
    --done: #3a7d5c;
    --done-text: #6fc99a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    padding: 0 0 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    text-align: center;
    padding: 70px 20px 50px;
    position: relative;
    z-index: 1;
  }

  .header-eyebrow {
    font-family: 'Crimson Pro', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 86px);
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.8s ease 0.25s forwards;
  }
  .plus-sign {
  display: inline-block;
  position: relative;
  top: 0.06em; /* опускает + чуть ниже */
  font-weight: 400;
}

  h1 em { font-style: italic; color: var(--accent); }

  .progress-bar-wrap {
    max-width: 480px;
    margin: 32px auto 0;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .categories {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 10px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .cat-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 4px;
  }

  .cat-btn:hover, .cat-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,168,76,0.05);
  }

  .list-container {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  .category-section { margin-bottom: 56px; }

  .cat-title {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dream-item {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .dream-item:hover { padding-left: 8px; background: rgba(255,255,255,0.01); }

  .dream-number {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    min-width: 28px;
    opacity: 0.7;
  }

  .dream-text {
    font-size: 18px;
    color: rgba(232,228,217,0.85);
    line-height: 1.4;
    flex: 1;
  }

  .dream-check {
    width: 20px;
    height: 20px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .dream-check svg { opacity: 0; transform: scale(0); transition: 0.3s; }

  .dream-item.done .dream-text { color: var(--muted); text-decoration: line-through; }
  .dream-item.done .dream-check { background: var(--done); border-color: var(--done); }
  .dream-item.done .dream-check svg { opacity: 1; transform: scale(1); }

  /* Особый стиль для 101 мечты */
  .special-dream {
    background: rgba(201, 168, 76, 0.03);
    border: 1px solid rgba(201, 168, 76, 0.2);

    border-radius: 4px;

    letter-spacing: 0.2em;

let done = JSON.parse(localStorage.getItem('dreams_101_done') || '[]');

function save() {
  localStorage.setItem('dreams_101_done', JSON.stringify(done));
}

function updateProgress() {
  const count = done.length;
  document.getElementById('progress-text').textContent = `${count} / 101`;
  document.getElementById('progress-fill').style.width = `${(count / 101) * 100}%`;
}

function render(cat) {
  const container = document.getElementById('list-container');
  container.innerHTML = '';

  const cats = cat === 'all' ? Object.keys(catLabels) : [cat];

  cats.forEach(c => {
    const items = dreams.filter(d => d.cat === c);
    if (!items.length) return;

    const section = document.createElement('div');
    section.className = 'category-section';

    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = catLabels[c];
    section.appendChild(title);

    items.forEach((d) => {
      const item = document.createElement('div');
      item.className = 'dream-item' + (done.includes(d.id) ? ' done' : '') + (d.special ? ' special-dream' : '');

      item.innerHTML = `
        <div class="dream-number">${d.id}</div>
        <div style="flex:1">
          <div class="dream-text">${d.text}</div>
          ${d.desc ? `<div class="special-desc">${d.desc}</div>` : ''}
          ${d.quote ? `<div class="special-quote">${d.quote}</div>` : ''}
        </div>
        <div class="dream-check">
          <svg width="12" height="10" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      `;

      item.addEventListener('click', () => {
        if (done.includes(d.id)) {
          done = done.filter(x => x !== d.id);
          item.classList.remove('done');
        } else {
          done.push(d.id);
          item.classList.add('done');
        }
        save();
        updateProgress();
      });

      section.appendChild(item);
    });

    container.appendChild(section);
  });
  updateProgress();
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.cat);
    window.scrollTo({ top: 400, behavior: 'smooth' });
  });
});

render('all');
</script>
</body>
</html>
